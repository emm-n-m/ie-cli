name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: iecli-linux-x86_64
            binary_path: target/release/iecli
            archive: iecli-linux-x86_64.tar.gz
          - os: windows-latest
            artifact_name: iecli-windows-x86_64
            binary_path: target/release/iecli.exe
            archive: iecli-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --release --locked

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          mkdir dist
          cp ${{ matrix.binary_path }} dist/
          tar -czf ${{ matrix.archive }} -C dist .

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item ${{ matrix.binary_path }} dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.archive }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/* 
